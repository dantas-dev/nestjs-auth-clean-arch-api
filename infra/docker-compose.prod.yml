name: nestjs-auth-clean-arch
services:                                                                                                                
    api:
      image: ghcr.io/your-org/nestjs-auth-clean-arch-api:latest
      healthcheck:
        test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
        interval: 10s                                                                                                        
        timeout: 5s
        retries: 5                                                                                                           
        start_period: 15s     
      env_file: .env                                                                                                              
      build:                                                         
        context: ..                                                                                                        
        dockerfile: infra/Dockerfile                                     
      environment:
        PORT: 5000
        P1_POSTGRES_HOST: ${POSTGRES_HOST}                                                                                         
        P1_POSTGRES_PORT: ${POSTGRES_PORT}
        P1_POSTGRES_USER: ${POSTGRES_USER}                                                                                         
        P1_POSTGRES_PASS: ${POSTGRES_PASS}                                       
        P1_POSTGRES_DB: ${POSTGRES_DB}             
        JWT_SECRET: ${JWT_SECRET}
        REDIS_HOST: ${REDIS_HOST}                      
        REDIS_PORT: ${REDIS_PORT}                                                                                         
      depends_on:                                                                                                              
        postgres:                                                                                                              
          condition: service_healthy                                                                                           
        redis:                                                                                                                 
          condition: service_healthy                                                          
      networks:                                     
        - app-network             

    postgres:
      image: postgres:16    
      healthcheck:                                                                                                           
        test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]                                              
        interval: 5s                                                                                                         
        timeout: 3s                                                        
        retries: 5                                                                                               
      environment:                                                       
        POSTGRES_USER: ${POSTGRES_USER}                      
        POSTGRES_PASSWORD: ${POSTGRES_PASS}            
        POSTGRES_DB: ${POSTGRES_DB}
      volumes:
        - postgres-data:/var/lib/postgresql/data
      networks:                                                                                                            
        - app-network

    redis:                                                               
      image: redis:7-alpine 
      healthcheck:                                                                                                           
        test: ["CMD", "redis-cli", "ping"]                                 
        interval: 5s                                                                                                         
        timeout: 3s                                                                                                          
        retries: 5         
      environment:
        REDIS_HOST: ${REDIS_HOST}                      
        REDIS_PORT: ${REDIS_PORT}
      networks:                                
        - app-network

    nginx:                                                                                                  
      image: nginx:alpine                                                                                   
      ports:                                                                                                
        - "80:80"                                                                                           
      volumes:                                                             
        - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      depends_on:                                                                                           
        api:
          condition: service_healthy                                                                        
      networks:
        - app-network

volumes:                                                                                                                 
  postgres-data:

networks:                                                              
  app-network:                                    
